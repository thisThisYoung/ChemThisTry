name: Build & Release

# Build installers for macOS, Windows and Linux.
#   - Push a tag like `v0.1.0`  → build all platforms and attach to a GitHub Release.
#   - Manual "Run workflow"     → build all platforms and upload artifacts only.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needed so the release job can create/update a GitHub Release from a tag.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (electron-vite)
        run: npm run build

      # ---- Package with electron-builder --------------------------------
      # Signing is opt-in via repository secrets. If the secrets are absent the
      # build is unsigned but still produced (useful for PRs / forks).
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --config electron-builder.js --mac --publish never
        env:
          # Signing / notarization (optional): set these secrets to enable.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Notarize only when an Apple ID secret is configured; absent secrets
          # fall back to an unsigned (but still produced) build — see config.
          CTT_NOTARIZE: ${{ secrets.APPLE_ID != '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --config electron-builder.js --win --publish never
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --config electron-builder.js --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Collect artifacts --------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chemthistry-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore
          retention-days: 14

  # Attach all built installers to a GitHub Release when a tag is pushed.
  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
